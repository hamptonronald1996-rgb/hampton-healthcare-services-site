<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hampton Healthcare OS</title><style>:root{--navy:#082b61;--gold:#c59628;--bg:#f4f6fa;--line:#dfe4ec;--text:#152033}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}header{background:var(--navy);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:center}header h1{margin:0;font-size:24px}header a{color:#fff}.wrap{max-width:1400px;margin:auto;padding:28px}.login,.panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 36px rgba(10,35,75,.07)}.login{max-width:460px;margin:70px auto;padding:30px}.login input,.login button,input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:8px;font:inherit}.login button,.save{background:var(--navy);color:#fff;border:0;font-weight:700;cursor:pointer}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:12px;margin-bottom:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.stat{background:#fff;padding:18px;border-radius:12px;border:1px solid var(--line)}.stat strong{display:block;font-size:28px;color:var(--navy)}.panel{overflow:hidden}.table{display:grid}.row{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 120px;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);align-items:center}.row.head{background:#eef2f8;font-weight:800}.row button{padding:9px;border:0;border-radius:7px;background:var(--gold);font-weight:800;cursor:pointer}.badge{display:inline-block;padding:5px 9px;border-radius:20px;background:#eaf0fa;font-size:12px;font-weight:800}.drawer{position:fixed;inset:0 0 0 auto;width:min(560px,100%);background:#fff;box-shadow:-18px 0 45px rgba(0,0,0,.18);padding:24px;overflow:auto;display:none}.drawer.open{display:block}.drawer h2{color:var(--navy)}.drawer label{display:block;font-weight:700;margin:14px 0 6px}.drawer .close{float:right;background:none;border:0;font-size:26px;cursor:pointer}.details{background:#f7f8fb;padding:14px;border-radius:10px;white-space:pre-wrap}.actions{display:flex;gap:10px;margin-top:18px}.error{color:#a31818;font-weight:700}@media(max-width:850px){.toolbar,.stats{grid-template-columns:1fr}.row{grid-template-columns:1fr}.row.head{display:none}.row>div:before{content:attr(data-label);display:block;font-size:11px;text-transform:uppercase;color:#667;font-weight:800;margin-bottom:3px}}</style></head><body><header><h1>Hampton Healthcare OS</h1><a href="/">View Website</a></header><main class="wrap"><section id="login" class="login"><h2>Staff Sign In</h2><p>Enter the private admin access password.</p><input id="token" type="password" placeholder="Admin password"><button id="loginBtn">Sign In</button><p id="loginError" class="error"></p></section><section id="app" hidden><div class="stats"><div class="stat"><strong id="total">0</strong>Total</div><div class="stat"><strong id="newCount">0</strong>New</div><div class="stat"><strong id="careCount">0</strong>Patient Intakes</div><div class="stat"><strong id="careerCount">0</strong>Applicants</div></div><div class="toolbar"><input id="search" placeholder="Search name, phone, email, or service"><select id="typeFilter"><option value="">All submission types</option><option value="care_request">Patient intakes</option><option value="caregiver_application">Caregiver applications</option></select><select id="statusFilter"><option value="">All statuses</option><option>New</option><option>Contacted</option><option>Consultation Scheduled</option><option>Qualified</option><option>Active Client</option><option>Closed</option></select><button id="exportBtn">Export CSV</button></div><div class="panel"><div class="row head"><div>Name</div><div>Type</div><div>Contact</div><div>Status</div><div>Action</div></div><div id="rows" class="table"></div></div></section></main><aside id="drawer" class="drawer"><button class="close" id="close">×</button><h2 id="drawerTitle"></h2><div id="details" class="details"></div><label>Status</label><select id="editStatus"><option>New</option><option>Contacted</option><option>Consultation Scheduled</option><option>Qualified</option><option>Active Client</option><option>Closed</option></select><label>Assigned to</label><input id="assigned"><label>Follow-up date</label><input id="followUp" type="date"><label>Internal notes</label><textarea id="notes" rows="7"></textarea><div class="actions"><button class="save" id="save">Save Changes</button></div><p id="saveMessage"></p></aside><script>let token=sessionStorage.getItem('hampton_admin')||'';let submissions=[];let current=null;const $=id=>document.getElementById(id);async function api(method='GET',body){const r=await fetch('/api/admin',{method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:body?JSON.stringify(body):undefined});if(!r.ok)throw new Error((await r.json()).error||'Request failed');return r.json()}async function load(){try{const data=await api();submissions=data.submissions||[];$('login').hidden=true;$('app').hidden=false;render()}catch(e){sessionStorage.removeItem('hampton_admin');$('loginError').textContent='Sign in failed. Check the password and Vercel environment variable.'}}function render(){const q=$('search').value.toLowerCase(),type=$('typeFilter').value,status=$('statusFilter').value;const filtered=submissions.filter(s=>(!type||s.type===type)&&(!status||(s.workflow?.status||'New')===status)&&JSON.stringify(s).toLowerCase().includes(q));$('total').textContent=submissions.length;$('newCount').textContent=submissions.filter(s=>(s.workflow?.status||'New')==='New').length;$('careCount').textContent=submissions.filter(s=>s.type==='care_request').length;$('careerCount').textContent=submissions.filter(s=>s.type==='caregiver_application').length;$('rows').innerHTML=filtered.map(s=>`<div class="row"><div data-label="Name"><strong>${esc(s.full_name||'Unnamed')}</strong><br><small>${new Date(s.created_at).toLocaleString()}</small></div><div data-label="Type">${s.type==='care_request'?'Patient Intake':'Caregiver Application'}</div><div data-label="Contact">${esc(s.phone||'')}<br>${esc(s.email||'')}</div><div data-label="Status"><span class="badge">${esc(s.workflow?.status||'New')}</span></div><div><button onclick="openItem('${s.id}')">Open</button></div></div>`).join('')||'<div class="row"><div>No matching submissions.</div></div>'}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}window.openItem=id=>{current=submissions.find(s=>String(s.id)===String(id));if(!current)return;$('drawerTitle').textContent=current.full_name||'Submission';const extra=Object.entries(current).filter(([k])=>!['message','workflow'].includes(k)).map(([k,v])=>`${k.replaceAll('_',' ')}: ${v??''}`).join('\n');$('details').textContent=extra+'\n\nMessage:\n'+(current.message||'');$('editStatus').value=current.workflow?.status||'New';$('assigned').value=current.workflow?.assigned_to||'';$('followUp').value=current.workflow?.follow_up||'';$('notes').value=current.workflow?.notes||'';$('drawer').classList.add('open')};$('close').onclick=()=>$('drawer').classList.remove('open');$('loginBtn').onclick=()=>{token=$('token').value.trim();sessionStorage.setItem('hampton_admin',token);load()};$('save').onclick=async()=>{if(!current)return;$('saveMessage').textContent='Saving...';try{const body={id:current.id,status:$('editStatus').value,assigned_to:$('assigned').value,follow_up:$('followUp').value,notes:$('notes').value};const result=await api('PATCH',body);current.workflow=result.workflow;$('saveMessage').textContent='Saved.';render()}catch(e){$('saveMessage').textContent=e.message}};['search','typeFilter','statusFilter'].forEach(id=>$(id).addEventListener('input',render));$('exportBtn').onclick=()=>{const cols=['created_at','type','full_name','phone','email','service_needed','status','assigned_to','follow_up','notes'];const csv=[cols.join(','),...submissions.map(s=>cols.map(c=>JSON.stringify(c==='status'?(s.workflow?.status||'New'):c==='assigned_to'?(s.workflow?.assigned_to||''):c==='follow_up'?(s.workflow?.follow_up||''):c==='notes'?(s.workflow?.notes||''):(s[c]??''))).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='hampton-submissions.csv';a.click()};if(token)load();</script></body></html>
